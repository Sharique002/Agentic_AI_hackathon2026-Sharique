# Render Blueprint — CARE Backend API
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: care-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
